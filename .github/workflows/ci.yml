name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || echo "No requirements file"

      - name: Build step
        run: |
          echo "Building application..."

      - name: Run tests
        run: |
          echo "Running tests..."
          if [ -f app.py ]; then
            echo "App file exists - test passed"
          else
            echo "Test failed" && exit 1
          fi

      - name: Run application
        run: python app.py
